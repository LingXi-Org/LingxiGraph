{{- if .Values.autoscaling.enabled }}
{{- range $component := list "api" "worker" }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "lingxigraph.fullname" $ }}-{{ $component }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "lingxigraph.fullname" $ }}-{{ $component }}
  minReplicas: {{ index $.Values.autoscaling $component "minReplicas" }}
  maxReplicas: {{ index $.Values.autoscaling $component "maxReplicas" }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ index $.Values.autoscaling $component "targetCPUUtilizationPercentage" }}
{{- end }}
{{- end }}
