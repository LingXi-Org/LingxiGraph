<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>LingxiGraph Studio</title>
  <link rel="stylesheet" href="./studio.css">
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="brand-mark">L</span><b>LingxiGraph</b><span>Studio</span></div>
    <div class="instance">
      <i id="connDot" class="conn off"></i>
      <span id="connText">连接中…</span>
      <b id="graphName">—</b><span class="version" id="graphVersion"></span>
    </div>
    <div class="graph-picker">
      <label for="graphSelect">Graph</label>
      <select id="graphSelect"></select>
      <label class="xray-toggle"><input type="checkbox" id="xrayToggle"> X-ray 子图</label>
    </div>
    <div class="top-actions">
      <button class="icon-btn" id="refreshBtn" title="重新加载结构">⟳</button>
      <button class="icon-btn" id="themeBtn" title="切换主题">◐</button>
      <button class="run-button" id="runButton"><span>▶</span> 运行</button>
    </div>
  </header>

  <main class="workspace">
    <!-- LEFT: graph explorer -->
    <section class="panel graph-panel">
      <div class="panel-head">
        <div><p class="eyebrow">GRAPH EXPLORER</p><h1>图结构</h1></div>
        <div class="graph-tools">
          <span><b id="nodeCount">0</b> 节点 · <b id="edgeCount">0</b> 边</span>
        </div>
      </div>
      <div class="graph-canvas" id="graphCanvas">
        <svg id="graphSvg" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="empty-hint" id="graphEmpty">选择一个 Graph 以查看结构</div>
      </div>
      <div class="node-detail" id="nodeDetail" hidden>
        <div class="node-detail-head">
          <div><span class="node-icon" id="ndIcon">◇</span>
            <div><b id="ndName">—</b><small id="ndKind"></small></div></div>
          <button id="ndClose" title="关闭">×</button>
        </div>
        <dl id="ndBody"></dl>
      </div>
    </section>

    <!-- MIDDLE: run trace -->
    <section class="panel trace-panel">
      <div class="panel-head trace-head">
        <div><p class="eyebrow">RUN TRACE</p><h2>运行轨迹 <span class="live" id="liveTag" hidden><i></i> LIVE</span></h2></div>
        <div class="run-input">
          <input id="inputBox" placeholder='输入 JSON，如 {"request":"你好"}' spellcheck="false">
        </div>
      </div>
      <div class="run-summary">
        <div><span class="status-dot" id="statusDot"></span><p><b id="runStatus">空闲</b><small id="runId">尚未运行</small></p></div>
        <div><small>耗时</small><b id="totalTime">—</b></div>
        <div><small>事件</small><b id="eventCount">0</b></div>
      </div>
      <div class="trace-tabs" role="tablist">
        <button class="active" data-trace="timeline">时间线</button>
        <button data-trace="events">事件流 <em id="evBadge">0</em></button>
        <button data-trace="errors">错误 <em id="errBadge" class="zero">0</em></button>
      </div>
      <div class="trace-list" id="traceList">
        <div class="empty-hint">运行 Graph 后，节点执行轨迹会在这里实时呈现</div>
      </div>
      <div class="event-list hidden" id="eventList"></div>
      <div class="error-list hidden" id="errorList"><div class="empty-hint">暂无错误</div></div>
      <div class="stream-foot">
        <span id="streamState"><i></i> 未连接</span>
        <button id="cancelButton" disabled>■ 取消运行</button>
      </div>
    </section>

    <!-- RIGHT: state & checkpoint inspector -->
    <section class="panel inspector-panel">
      <div class="panel-head"><div><p class="eyebrow">STATE &amp; CHECKPOINT</p><h2>状态检查器</h2></div></div>
      <div class="checkpoint-select">
        <small>检查点</small>
        <select id="checkpointSelect"><option>—</option></select>
      </div>
      <div class="inspector-tabs">
        <button class="active" data-tab="state">状态</button>
        <button data-tab="history">历史 <em id="histBadge">0</em></button>
        <button data-tab="explain">解释</button>
      </div>
      <div class="state-view" id="stateView">
        <div class="code-toolbar"><span id="stateLabel">StateSnapshot</span><button id="copyButton">复制</button></div>
        <pre id="stateCode" class="code"><span class="dim">运行后在此查看状态快照</span></pre>
      </div>
      <div class="state-view hidden" id="historyView"><div class="empty-hint">暂无历史</div></div>
      <div class="state-view hidden" id="explainView"><div class="empty-hint">选择一个节点以查看解释</div></div>
      <div class="interrupt-card" id="interruptCard" hidden>
        <div class="interrupt-title"><span>Ⅱ</span><div><b>Interrupt 暂停</b><small id="interruptWhy">运行已暂停</small></div></div>
        <textarea id="resumeValue" placeholder='resume 值 (JSON)，如 "approved"'></textarea>
        <button id="resumeButton">继续运行</button>
      </div>
      <footer class="inspector-foot">
        <span>快照 <b id="snapSize">—</b></span><span>序列化 <b>JSON</b></span>
      </footer>
    </section>
  </main>
  <div class="toast" id="toast"></div>
  <script src="./studio.js"></script>
</body>
</html>
